<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Memory Card Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  min-height:100vh;padding:20px;color:#1e293b;
}
.container{max-width:800px;margin:0 auto;}
h1{text-align:center;color:#b45309;font-size:clamp(1.5rem,5vw,2.4rem);margin-bottom:8px;}
.info{text-align:center;margin-bottom:16px;color:#78350f;}
.stats{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.stat{
  background:#fff;padding:10px 18px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);
  font-weight:600;
}
.stat span{color:#b45309;font-weight:700;}
.board{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:520px;margin:0 auto;
}
@media(max-width:520px){.board{gap:6px;}}
.card{
  aspect-ratio:3/4;perspective:1000px;cursor:pointer;
}
.card-inner{
  position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;
}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-front,.card-back{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;
  display:flex;justify-content:center;align-items:center;font-size:clamp(1.2rem,5vw,2rem);
  font-weight:700;box-shadow:0 4px 10px rgba(0,0,0,.15);text-align:center;padding:6px;
}
.card-front{background:linear-gradient(135deg,#f59e0b,#b45309);color:#fff;}
.card-back{background:#fff;color:#1d4ed8;transform:rotateY(180deg);border:3px solid #f59e0b;}
.card.matched .card-back{background:#dcfce7;border-color:#16a34a;color:#166534;}
.controls{text-align:center;margin-top:24px;}
button{
  background:#f59e0b;color:#fff;border:none;padding:14px 28px;font-size:1rem;
  border-radius:12px;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;
  margin:6px;box-shadow:0 4px 0 #b45309;transition:transform .1s ease;
}
button:active{transform:translateY(2px);box-shadow:0 2px 0 #b45309;}
button.warn{background:#3b82f6;box-shadow:0 4px 0 #1e40af;}
.result-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
  justify-content:center;align-items:center;z-index:100;padding:20px;
}
.result-modal.active{display:flex;}
.result-content{
  background:#fff;padding:30px;border-radius:20px;text-align:center;max-width:420px;width:100%;
  animation:pop .4s ease;
}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.result-content h2{color:#b45309;font-size:2rem;margin-bottom:10px;}
.score-big{font-size:3rem;font-weight:700;color:#16a34a;margin:14px 0;}
.grade{
  display:inline-block;padding:8px 20px;border-radius:12px;font-size:1.4rem;font-weight:700;
  margin:10px 0;
}
.grade-A{background:#dcfce7;color:#166534;}
.grade-B{background:#dbeafe;color:#1e40af;}
.grade-C{background:#fef3c7;color:#854d0e;}
.grade-D{background:#fed7aa;color:#9a3412;}
.grade-F{background:#fecaca;color:#991b1b;}
.auto-saved{
  background:#dcfce7;color:#166534;padding:10px;border-radius:10px;
  font-weight:600;margin:14px 0;font-size:.95rem;
}
</style>
</head>
<body>

<div class="container">
  <h1>🂡 ICT Memory Card Game</h1>
  <p class="info">Match the pairs with as few moves as possible!</p>

  <div class="stats">
    <div class="stat">⏱️ <span id="timer">0</span>s</div>
    <div class="stat">🎯 Moves: <span id="moves">0</span></div>
    <div class="stat">✅ Pairs: <span id="pairs">0</span>/<span id="totalPairs">8</span></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="warn" onclick="resetGame()">🔄 New Game</button>
  </div>
</div>

<div class="result-modal" id="resultModal">
  <div class="result-content">
    <h2>🎉 You Won!</h2>
    <p>You finished in <strong id="finalMoves">0</strong> moves and <strong id="finalTime">0</strong>s</p>
    <div class="score-big" id="finalScoreText">0 / 100</div>
    <div class="grade" id="finalGrade">A</div>
    <p id="gradeLabel">Excellent!</p>
    <div class="auto-saved" id="autoSavedMsg">✨ Score automatically saved to leaderboard!</div>
    <button onclick="resetGame();closeModal();">🔄 Play Again</button>
  </div>
</div>

<script>
// ============ GAME DATA ============
const ICT_PAIRS = ["💻","🖱️","⌨️","🖨️","💾","📱","🖥️","🌐"];
const TOTAL_PAIRS = ICT_PAIRS.length;
const MAX_SCORE = 100;

let cards = [];
let flipped = [];
let matchedCount = 0;
let moves = 0;
let timerSec = 0;
let timerInterval = null;
let lock = false;
let gameStarted = false;
let gameEnded = false;

// ============ INIT ============
function initGame() {
  matchedCount = 0; moves = 0; timerSec = 0;
  flipped = []; lock = false; gameStarted = false; gameEnded = false;
  clearInterval(timerInterval);

  document.getElementById("moves").textContent = "0";
  document.getElementById("timer").textContent = "0";
  document.getElementById("pairs").textContent = "0";
  document.getElementById("totalPairs").textContent = TOTAL_PAIRS;

  // Build deck
  const deck = [...ICT_PAIRS, ...ICT_PAIRS].sort(() => Math.random() - 0.5);
  cards = deck.map((symbol, i) => ({ id: i, symbol, matched: false }));

  // Render
  const board = document.getElementById("board");
  board.innerHTML = "";
  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";
    div.dataset.id = card.id;
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front">?</div>
        <div class="card-back">${card.symbol}</div>
      </div>`;
    div.onclick = () => flipCard(card.id);
    board.appendChild(div);
  });
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    if (gameEnded) return;
    timerSec++;
    document.getElementById("timer").textContent = timerSec;
  }, 1000);
}

// ============ FLIP LOGIC ============
function flipCard(id) {
  if (lock || gameEnded) return;
  const cardEl = document.querySelector(`.card[data-id="${id}"]`);
  if (!cardEl || cardEl.classList.contains("flipped") || cardEl.classList.contains("matched")) return;

  if (!gameStarted) { gameStarted = true; startTimer(); }

  cardEl.classList.add("flipped");
  flipped.push(id);

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    lock = true;
    const [a, b] = flipped;
    const cardA = cards[a], cardB = cards[b];
    if (cardA.symbol === cardB.symbol) {
      // Match
      setTimeout(() => {
        document.querySelector(`.card[data-id="${a}"]`).classList.add("matched");
        document.querySelector(`.card[data-id="${b}"]`).classList.add("matched");
        cardA.matched = cardB.matched = true;
        matchedCount++;
        document.getElementById("pairs").textContent = matchedCount;
        flipped = []; lock = false;
        if (matchedCount === TOTAL_PAIRS) finishGame();
      }, 500);
    } else {
      // No match
      setTimeout(() => {
        document.querySelector(`.card[data-id="${a}"]`).classList.remove("flipped");
        document.querySelector(`.card[data-id="${b}"]`).classList.remove("flipped");
        flipped = []; lock = false;
      }, 900);
    }
  }
}

// ============ FINISH / SCORE ============
function finishGame() {
  gameEnded = true;
  clearInterval(timerInterval);

  // Score formula:
  //   Perfect = TOTAL_PAIRS moves (each pair found on first try)
  //   Penalty: 5 points per extra move + 1 point per 3 seconds (capped)
  const extraMoves = Math.max(0, moves - TOTAL_PAIRS);
  const movePenalty = extraMoves * 5;
  const timePenalty = Math.min(30, Math.floor(timerSec / 3));
  let score = MAX_SCORE - movePenalty - timePenalty;
  score = Math.max(0, Math.min(MAX_SCORE, score));

  showResult(score, MAX_SCORE);

  // ⭐ AUTO-SUBMIT TO HUB
  sendScoreToHub(score, MAX_SCORE);
}

function calculateGrade(score, total) {
  const pct = (score / total) * 100;
  if (pct >= 90) return { letter: "A", label: "Excellent!", cls: "grade-A" };
  if (pct >= 80) return { letter: "B", label: "Very Good!", cls: "grade-B" };
  if (pct >= 70) return { letter: "C", label: "Good!", cls: "grade-C" };
  if (pct >= 60) return { letter: "D", label: "Fair", cls: "grade-D" };
  return { letter: "F", label: "Keep practicing!", cls: "grade-F" };
}

function showResult(score, total) {
  const g = calculateGrade(score, total);
  document.getElementById("finalMoves").textContent = moves;
  document.getElementById("finalTime").textContent = timerSec;
  document.getElementById("finalScoreText").textContent = `${score} / ${total}`;
  const gradeEl = document.getElementById("finalGrade");
  gradeEl.textContent = g.letter;
  gradeEl.className = "grade " + g.cls;
  document.getElementById("gradeLabel").textContent = g.label;

  const inIframe = window.parent && window.parent !== window;
  document.getElementById("autoSavedMsg").style.display = inIframe ? "block" : "none";

  document.getElementById("resultModal").classList.add("active");
}

function closeModal() {
  document.getElementById("resultModal").classList.remove("active");
}

function resetGame() {
  closeModal();
  initGame();
}

// ============ ⭐ SEND SCORE TO PARENT HUB ============
function sendScoreToHub(score, maxScore) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({
      type: "GAME_SCORE",
      game: "cardgame",
      score: score,
      max: maxScore,
      moves: moves,
      time: timerSec
    }, "*");
    console.log("✅ Score sent to hub:", score, "/", maxScore);
  } else {
    console.log("Standalone mode — score not sent.");
  }
}

// ============ START ============
initGame();
<script>
// Auto-send score to parent hub
function sendScoreToHub(score, max) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: "GAME_SCORE", score: score, max: max }, "*");
  }
}
// Call this when your game ends, e.g.:
// sendScoreToHub(finalScore, totalQuestions);
</script>
</body>
</html>
