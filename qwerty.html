// ============ MESSAGE LISTENER (handles many formats) ============
window.addEventListener("message", (event)=>{
const data = event.data;
if(!data) return;

// Skip non-relevant messages
if(typeof data === "string"){
// Try parse if string
try { const p = JSON.parse(data); if(p && typeof p === "object") return handleMessageData(p); } catch(e){ return; }
return;
}
if(typeof data !== "object") return;
handleMessageData(data);
});

function handleMessageData(data){
// Recognized score message types
const isScoreMsg = data.type === "GAME_SCORE" 
|| data.type === "score" 
|| data.type === "GAME_OVER" 
|| data.type === "gameOver"
|| data.event === "score"
|| data.event === "gameOver"
|| (data.score !== undefined && data.max !== undefined)
|| (data.score !== undefined && data.total !== undefined)
|| (data.score !== undefined && data.maxScore !== undefined);

if(!isScoreMsg) return;

const score = parseInt(data.score ?? data.points ?? data.value);
const max = parseInt(data.max ?? data.total ?? data.maxScore ?? data.outOf ?? data.max_score ?? 100);

if(isNaN(score) || isNaN(max) || max <= 0){
console.warn("Invalid score format:", data);
return;
}

console.log("✅ Score message received:", { score, max, raw: data });
recordMinigameScore(score, max, false);
}

const tsc=leaderboard.length, tqs=Object.values(quizzes).reduce((s,q)=>s+(q.questions?.length||0),0);
const tmg=(minigameScores.dragdrop?.length||0)+(minigameScores.cardgame?.length||0);
$("adminStats").innerHTML=`<div class="stat-card"><div class="num">${tt}</div><div class="label">👩‍🏫 Teachers</div></div><div class="stat-card"><div class="num">${ts}</div><div class="label">👨‍🎓 Students</div></div><div class="stat-card"><div class="num">${tq}</div><div class="label">📚 Quizzes</div></div><div class="stat-card"><div class="num">${tqs}</div><div class="label">❓ Questions</div></div><div class="stat-card"><div class="num">${tsc}</div><div class="label">🏆 Quiz Scores</div></div><div class="stat-card"><div class="num">${tmg}</div><div class="label">🎮 Mini-game Scores</div></div>`;
}

document.querySelectorAll(".admin-tabs button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".admin-tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".admin-section").forEach(s=>s.classList.remove("active"));
$("admin"+btn.dataset.tab.charAt(0).toUpperCase()+btn.dataset.tab.slice(1)).classList.add("active");
};
});

function renderAdminTables(){ renderAdminTeachers(); renderAdminStudents(); renderAdminQuizzes(); renderAdminScores(); renderAdminMinigames(); }

function renderAdminTeachers() {
const f=($("teacherSearch").value||"").toLowerCase();
const entries=Object.entries(teachers).filter(([e,t])=>e.includes(f)||(t.displayName||"").toLowerCase().includes(f));
const tb=$("teachersTableBody");
if(!entries.length){ tb.innerHTML=`<tr><td colspan="5"><div class="empty-state"><div class="icon">👩‍🏫</div><h3>No teachers</h3></div></td></tr>`; return; }
tb.innerHTML=entries.map(([email,t])=>{
const qc=Object.values(quizzes).filter(q=>q.ownerEmail===email).length;
return `<tr><td>${escapeHtml(email)}</td><td>${escapeHtml(t.displayName||"")}</td><td>${qc}</td><td style="font-size:.8rem;">${fmtDate(t.createdAt)}</td><td class="action-cell"><button class="warn-btn" onclick="adminSendReset('${email}')">📧 Reset</button><button class="admin-btn" onclick="adminForceResetPass('${email}')">🔑 Set Pass</button><button class="delete-btn" onclick="adminDeleteTeacher('${email}')">🗑</button></td></tr>`;
}).join("");
}

function renderAdminStudents() {
const f=($("studentSearch").value||"").toLowerCase();
const entries=Object.entries(students).filter(([k,s])=>s.name.toLowerCase().includes(f));
const tb=$("studentsTableBody");
if(!entries.length){ tb.innerHTML=`<tr><td colspan="5"><div class="empty-state"><div class="icon">👨‍🎓</div><h3>No students</h3></div></td></tr>`; return; }
tb.innerHTML=entries.map(([key,s])=>{
const a=s.attempts||{}, taken=Object.keys(a).length, total=Object.values(a).reduce((x,y)=>x+y,0);
return `<tr><td>${escapeHtml(s.name)}</td><td>${taken}</td><td>${total}</td><td style="font-size:.8rem;">${fmtDate(s.createdAt)}</td><td class="action-cell"><button class="warn-btn" onclick="adminResetStudentAttempts('${key}')">🔄</button><button class="delete-btn" onclick="adminDeleteStudent('${key}')">🗑</button></td></tr>`;
}).join("");
}

function renderAdminQuizzes() {
const f=($("quizSearchAdmin").value||"").toLowerCase();
const entries=Object.values(quizzes).filter(q=>q.title.toLowerCase().includes(f));
const tb=$("quizzesTableBody");
if(!entries.length){ tb.innerHTML=`<tr><td colspan="7"><div class="empty-state"><div class="icon">📚</div><h3>No quizzes</h3></div></td></tr>`; return; }
tb.innerHTML=entries.map(q=>{
const sc=leaderboard.filter(l=>l.quizId===q.id).length;
return `<tr><td>${escapeHtml(q.title)}</td><td>${escapeHtml(q.ownerName||"")}<br><span style="font-size:.75rem;color:#64748b;">${escapeHtml(q.ownerEmail||"")}</span></td><td><code>${q.code}</code></td><td>${q.visibility==='public'?'🌐':'🔒'}</td><td>${q.questions?.length||0}</td><td>${sc}</td><td class="action-cell"><button class="admin-btn" onclick="adminEditQuiz('${q.id}')">✏️</button><button class="warn-btn" onclick="adminResetQuizLb('${q.id}')">🧹</button><button class="delete-btn" onclick="adminDeleteQuiz('${q.id}')">🗑</button></td></tr>`;
}).join("");
}

function renderAdminScores() {
const f=($("scoreSearch").value||"").toLowerCase();
const rows=leaderboard.filter(l=>{
const t=quizzes[l.quizId]?.title||"(deleted)";
return l.name.toLowerCase().includes(f)||t.toLowerCase().includes(f);
});
const tb=$("scoresTableBody");
if(!rows.length){ tb.innerHTML=`<tr><td colspan="7"><div class="empty-state"><div class="icon">🏆</div><h3>No scores</h3></div></td></tr>`; return; }
tb.innerHTML=rows.map(l=>{
const t=quizzes[l.quizId]?.title||"(deleted)";
return `<tr><td>${escapeHtml(l.name)}</td><td>${escapeHtml(t)}</td><td>${l.level}</td><td>${l.score}/${l.total}</td><td>${gradeBadgeSmall(l.score,l.total)}</td><td style="font-size:.8rem;">${l.date}</td><td class="action-cell"><button class="delete-btn" onclick="adminDeleteScore(${leaderboard.indexOf(l)})">🗑</button></td></tr>`;
}).join("");
}

let adminActiveMg = "dragdrop";
document.querySelectorAll("#adminMinigames .lb-tabs button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll("#adminMinigames .lb-tabs button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
adminActiveMg = btn.dataset.mgame;
renderAdminMinigames();
};
});
function renderAdminMinigames() {
const f=($("mgSearch").value||"").toLowerCase();
const gameName = adminActiveMg === "dragdrop" ? "Drag & Drop" : "Card Game";
const rows = (minigameScores[adminActiveMg]||[]).filter(s=>s.name.toLowerCase().includes(f));
const tb=$("mgTableBody");
if(!rows.length){ tb.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="icon">🎮</div><h3>No ${gameName} scores yet</h3></div></td></tr>`; return; }
tb.innerHTML = rows.map(s=>{
const realIdx = (minigameScores[adminActiveMg]||[]).indexOf(s);
return `<tr><td>${escapeHtml(s.name)}</td><td>${gameName}</td><td>${s.score}/${s.total}</td><td>${gradeBadgeSmall(s.score,s.total)}</td><td style="font-size:.8rem;">${s.date}</td><td class="action-cell"><button class="delete-btn" onclick="adminDeleteMgScore('${adminActiveMg}',${realIdx})">🗑</button></td></tr>`;
}).join("");
}
window.adminDeleteMgScore = (game,idx)=>{
if(!confirm("Delete?")) return;
minigameScores[game].splice(idx,1); saveAll(); toast("🗑 Deleted","admin"); renderAdminStats(); renderAdminMinigames();
};
$("mgSearch").oninput=renderAdminMinigames;
$("clearAllMgScoresBtn").onclick=()=>{
if(!confirm(`Clear all ${adminActiveMg} scores?`)) return;
minigameScores[adminActiveMg] = []; saveAll();
toast("🧹 Cleared","admin"); renderAdminStats(); renderAdminMinigames();
};

$("teacherSearch").oninput=renderAdminTeachers;
$("studentSearch").oninput=renderAdminStudents;
$("quizSearchAdmin").oninput=renderAdminQuizzes;
$("scoreSearch").oninput=renderAdminScores;
$("refreshAdminBtn").onclick=()=>{ renderAdminStats(); renderAdminTables(); toast("🔄 Refreshed","admin"); };

window.adminSendReset=email=>{
if(!teachers[email]){ toast("Not found","error"); return; }
const token=genResetToken(); resetTokens[email]={token,expiresAt:Date.now()+15*60*1000}; saveAll();
$("modalEmailFrom").textContent="admin@ictquizzes.com"; $("modalEmailTo").textContent=email;
$("modalEmailSubject").textContent="[Admin] Password Reset";
$("modalUserName").textContent=teachers[email].displayName||"Teacher";
$("modalEmailIntro").innerHTML=`Admin initiated reset. Use within <strong>15 minutes</strong>.`;
$("modalResetToken").textContent=token; $("modalEmailFooter").textContent="Admin-initiated.";
$("emailModal").classList.add("active"); toast(`📧 Reset code for ${email}`,"admin");
};
window.adminForceResetPass=email=>{
if(!teachers[email]) return;
const np=prompt(`New password for ${email} (min 6):`); if(np===null) return;
if(np.length<6){ toast("Too short","error"); return; }
teachers[email].password=np; saveAll(); toast(`✅ Password set for ${email}`,"admin");
};
window.adminDeleteTeacher=email=>{
if(!confirm(`Delete "${email}" and ALL their quizzes?`)) return;
const ids=Object.values(quizzes).filter(q=>q.ownerEmail===email).map(q=>q.id);
ids.forEach(id=>delete quizzes[id]); leaderboard=leaderboard.filter(l=>!ids.includes(l.quizId));
delete teachers[email]; delete resetTokens[email]; saveAll();
toast("🗑 Deleted","admin"); renderAdminStats(); renderAdminTables();
};
window.adminDeleteStudent=key=>{
if(!confirm(`Delete "${students[key]?.name}"?`)) return;
const name=students[key]?.name; delete students[key];
if(name){
leaderboard=leaderboard.filter(l=>l.name.toLowerCase()!==name.toLowerCase());
minigameScores.dragdrop=(minigameScores.dragdrop||[]).filter(s=>s.name.toLowerCase()!==name.toLowerCase());
minigameScores.cardgame=(minigameScores.cardgame||[]).filter(s=>s.name.toLowerCase()!==name.toLowerCase());
}
saveAll(); toast("🗑 Deleted","admin"); renderAdminStats(); renderAdminTables();
};
window.adminResetStudentAttempts=key=>{
if(!students[key]) return; if(!confirm("Reset attempts?")) return;
students[key].attempts={}; saveAll(); toast("🔄 Reset","admin"); renderAdminStudents();
};
window.adminDeleteQuiz=id=>{
if(!confirm(`Delete "${quizzes[id]?.title}"?`)) return;
delete quizzes[id]; leaderboard=leaderboard.filter(l=>l.quizId!==id);
saveAll(); toast("🗑 Deleted","admin"); renderAdminStats(); renderAdminTables();
};
window.adminResetQuizLb=id=>{
if(!confirm("Clear leaderboard?")) return;
leaderboard=leaderboard.filter(l=>l.quizId!==id); saveAll();
toast("🧹 Cleared","admin"); renderAdminStats(); renderAdminScores();
};
window.adminEditQuiz=id=>{ editingQuizId=id; openEditor(true); };
window.adminDeleteScore=idx=>{
if(!confirm("Delete score?")) return;
leaderboard.splice(idx,1); saveAll(); toast("🗑 Deleted","admin"); renderAdminStats(); renderAdminScores();
};

$("addTeacherBtn").onclick=()=>{
const email=prompt("Teacher Gmail:"); if(!email) return;
const em=email.trim().toLowerCase();
if(!em.endsWith("@gmail.com")){ toast("Must be Gmail","error"); return; }
if(teachers[em]){ toast("Already exists","error"); return; }
const name=prompt("Display name:"); if(!name||name.trim().length<2){ toast("Invalid name","error"); return; }
const pass=prompt("Initial password (min 6):"); if(!pass||pass.length<6){ toast("Too short","error"); return; }
teachers[em]={password:pass,displayName:name.trim(),createdAt:new Date().toISOString()};
saveAll(); toast("✅ Teacher created","admin"); renderAdminStats(); renderAdminTeachers();
};

$("deleteAllTeachersBtn").onclick=()=>{
if(!confirm("⚠️ DELETE ALL TEACHERS?")) return;
if(prompt("Type DELETE:")!=="DELETE") return;
const emails=Object.keys(teachers);
const ids=Object.values(quizzes).filter(q=>emails.includes(q.ownerEmail)).map(q=>q.id);
ids.forEach(id=>delete quizzes[id]); leaderboard=leaderboard.filter(l=>!ids.includes(l.quizId));
teachers={}; resetTokens={}; saveAll();
toast("🗑 All teachers deleted","admin"); renderAdminStats(); renderAdminTables();
};
$("deleteAllStudentsBtn").onclick=()=>{
if(!confirm("⚠️ DELETE ALL STUDENTS?")) return;
if(prompt("Type DELETE:")!=="DELETE") return;
students={}; leaderboard=[]; minigameScores={dragdrop:[],cardgame:[]}; saveAll();
toast("🗑 All students deleted","admin"); renderAdminStats(); renderAdminTables();
};
$("resetAllAttemptsBtn").onclick=()=>{
if(!confirm("Reset ALL attempts?")) return;
Object.keys(students).forEach(k=>{students[k].attempts={};});
saveAll(); toast("🔄 All reset","admin"); renderAdminStudents();
};
$("deleteAllQuizzesBtn").onclick=()=>{
if(!confirm("⚠️ DELETE ALL QUIZZES?")) return;
if(prompt("Type DELETE:")!=="DELETE") return;
quizzes={}; leaderboard=[]; saveAll();
toast("🗑 All quizzes deleted","admin"); renderAdminStats(); renderAdminTables();
};
$("clearAllScoresBtn").onclick=()=>{
if(!confirm("Clear ALL quiz scores?")) return;
leaderboard=[]; saveAll(); toast("🧹 All cleared","admin"); renderAdminStats(); renderAdminScores();
};
$("adminDashBack").onclick=()=>{ if(!confirm("Logout?")) return; doLogout(); };

$("homeBtn").onclick=()=>{
$("gameFrameContainer").classList.remove("active"); $("gameIframe").src="about:blank";
activeMinigame=null; lastSavedScoreKey=null;
clearInterval(timerInterval);
if(!currentUser){ showScreen("roleScreen"); updateTopNav(); return; }
if(currentUser.role==="teacher") openTeacherDashboard();
else if(currentUser.role==="admin") openAdminDashboard();
else openStudentHub();
};
$("logoutBtn").onclick=()=>{ if(!confirm("Log out?")) return; doLogout(); };

function restoreSession() {
const savedUser=loadSession();
const params=new URLSearchParams(location.search);
const linkCode=params.get("quiz");

if(linkCode) {
const quiz=Object.values(quizzes).find(q=>q.code===linkCode.toUpperCase());
if(!quiz){ toast("Quiz link invalid.","error"); }
else {
if(savedUser&&savedUser.role==="student"&&students[savedUser.key]){
currentUser=savedUser; updateTopNav(); enterQuiz(quiz.id); return;
}
showScreen("studentAuthScreen");
$("studentError").textContent=`You're joining: "${quiz.title}". Enter your name.`;
const oldHandler=$("studentSubmit").onclick;
$("studentSubmit").onclick=()=>{
const name=$("studentName").value.trim(), remember=$("rememberMeStudent").checked;
if(name.length<2){ $("studentError").textContent="Min 2 chars."; return; }
const key=name.toLowerCase();
if(!students[key]) students[key]={name,attempts:{},createdAt:new Date().toISOString()};
currentUser={role:"student",name,key}; saveAll(); saveSession(remember);
$("studentSubmit").onclick=oldHandler; enterQuiz(quiz.id);
};
return;
}
}

if(!savedUser){ showScreen("roleScreen"); return; }

if(savedUser.role==="admin"){
currentUser=savedUser; openAdminDashboard(); toast("🛡️ Admin session restored","admin"); return;
}
if(savedUser.role==="teacher"){
if(!teachers[savedUser.email]){ clearSession(); showScreen("roleScreen"); return; }
currentUser=savedUser; currentUser.displayName=teachers[savedUser.email].displayName;
openTeacherDashboard(); toast(`Welcome back, ${currentUser.displayName}!`,"success");
} else if(savedUser.role==="student"){
if(!students[savedUser.key]) students[savedUser.key]={name:savedUser.name,attempts:{},createdAt:new Date().toISOString()};
currentUser=savedUser; saveAll(); openStudentHub();
toast(`Welcome back, ${currentUser.name}!`,"success");
}
}

window.addEventListener("DOMContentLoaded", async()=>{
const ok=await initCloud();
if(ok) restoreSession();
else showScreen("roleScreen");
$("loadingOverlay").style.display="none";
});
</script>
