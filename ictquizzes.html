<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamified Lesson Quizzes</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

*{box-sizing:border-box}

:root{
  --radius:clamp(14px,2vw,20px);
  --pad:clamp(16px,4vw,40px);
  --btn-pad:clamp(14px,3vw,20px);
  --btn-font:clamp(1rem,3.5vw,1.15rem);
  --text:clamp(1rem,3.5vw,1.15rem);
  --question:clamp(1.3rem,4.5vw,1.7rem);
  --title:clamp(2.2rem,7vw,4.5rem);
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(180deg,#f8fafc,#e0f2fe);
  color:#1e293b;
}

button{
  width:100%;
  max-width:360px;
  padding:var(--btn-pad);
  font-size:var(--btn-font);
  background:#3b82f6;
  color:#fff;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
  margin:10px 0;
  box-shadow:0 6px 0 #1e40af;
}

.quiz-box{
  width:100%;
  max-width:1000px;
  margin:20px auto;
  background:#fff;
  padding:var(--pad);
  border-radius:var(--radius);
  box-shadow:0 20px 40px rgba(0,0,0,.1);
  display:none;
}

.question{text-align:center;font-size:var(--question);margin-bottom:20px;}
.options button{background:#eff6ff;color:#1e293b;border:2px solid #3b82f6;}
.correct-glow{box-shadow:0 0 15px 5px #16a34a}
.wrong-glow{box-shadow:0 0 15px 5px #dc2626}

</style>

<!-- EMAILJS -->
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
emailjs.init("YOUR_PUBLIC_KEY");
</script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_CONFIG",
  authDomain: "YOUR_FIREBASE_CONFIG",
  projectId: "YOUR_FIREBASE_CONFIG",
  storageBucket: "YOUR_FIREBASE_CONFIG",
  messagingSenderId: "YOUR_FIREBASE_CONFIG",
  appId: "YOUR_FIREBASE_CONFIG"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;
let isTeacher=false;
let userEmail="";
let filtered=[],index=0,score=0;

const MAX_ATTEMPTS=2;
</script>

</head>

<body>

<!-- LOGIN -->
<section id="loginScreen" style="text-align:center;padding:30px;">
  <h2>Login</h2>

  <button onclick="googleLogin()">Login with Google</button>
  <button onclick="teacherLogin()">Teacher Login</button>

  <hr>

  <input type="email" id="emailInput" placeholder="email for quiz"
    style="padding:12px;width:80%;max-width:300px;margin:10px;border-radius:10px">

  <br>

  <button id="startBtn">Start Quiz</button>

  <p id="emailMsg" style="color:red;"></p>
</section>

<!-- QUIZ -->
<header id="difficultyScreen" style="display:none;text-align:center;">
  <h1>ICT Quizzes</h1>
  <button data-level="easy">Easy</button>
  <button data-level="medium">Medium</button>
  <button data-level="hard">Hard</button>

  <button onclick="showLeaderboard()">Leaderboard</button>
  <button onclick="showTeacherDashboard()">Teacher Dashboard</button>
</header>

<section class="quiz-box" id="quizBox">
  <div class="question" id="question"></div>
  <div class="options" id="options"></div>
</section>

<section class="quiz-box" id="resultBox">
  <h2>Score</h2>
  <p id="score"></p>
</section>

<script>

// QUIZ DATA (UNCHANGED STYLE)
const questions=[
{q:"ICT stands for?",o:["Information & Communication Technology","Internet Tool","Internal Tech","Info Control"],a:0,l:"easy"},
{q:"Input device?",o:["Monitor","Keyboard","Speaker","Printer"],a:1,l:"easy"},
{q:"RAM is?",o:["Storage","Memory","CPU","GPU"],a:1,l:"medium"},
{q:"Firewall?",o:["Virus","Security","App","OS"],a:1,l:"hard"}
];

// LOGIN GOOGLE
function googleLogin(){
  const provider=new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(async res=>{
    currentUser=res.user;
    userEmail=res.user.email;

    const ref=db.collection("users").doc(userEmail);
    const doc=await ref.get();

    if(!doc.exists){
      await ref.set({email:userEmail,attempts:0,role:"student"});
    }

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("difficultyScreen").style.display="block";
  });
}

// TEACHER LOGIN
function teacherLogin(){
  let email=prompt("Teacher email");
  let pass=prompt("Password");

  if(email==="teacher@school.com" && pass==="1234"){
    isTeacher=true;
    alert("Teacher mode enabled");
  }
}

// START QUIZ EMAIL MODE
document.getElementById("startBtn").onclick=async()=>{
  userEmail=document.getElementById("emailInput").value;

  const ref=db.collection("users").doc(userEmail);
  const doc=await ref.get();

  let data=doc.exists?doc.data():{attempts:0};

  if(data.attempts>=2){
    document.getElementById("emailMsg").innerText="2 attempts used";
    return;
  }

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("difficultyScreen").style.display="block";
};

// DIFFICULTY
document.querySelectorAll("[data-level]").forEach(btn=>{
btn.onclick=()=>{
  filtered=questions.filter(q=>q.l===btn.dataset.level);
  index=score=0;
  loadQ();
};
});

function loadQ(){
  let q=filtered[index];
  document.getElementById("quizBox").style.display="block";

  document.getElementById("question").innerText=q.q;

  let opt=document.getElementById("options");
  opt.innerHTML="";

  q.o.forEach((o,i)=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>answer(i===q.a);
    opt.appendChild(b);
  });
}

function answer(correct){
  if(correct)score++;
  index++;

  index<filtered.length?loadQ():finish();
}

async function finish(){

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("score").innerText=score+"/"+filtered.length;

// SAVE CLOUD
await db.collection("scores").add({
email:userEmail,
score:score,
total:filtered.length
});

let ref=db.collection("users").doc(userEmail);
let doc=await ref.get();

let a=doc.data().attempts+1;

await ref.update({attempts:a});

// EMAIL SCORE
emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
to_email:userEmail,
score:score+"/"+filtered.length
});
}

// LEADERBOARD
async function showLeaderboard(){
let snap=await db.collection("scores").orderBy("score","desc").limit(10).get();

let txt="LEADERBOARD\n";
snap.forEach(d=>{
txt+=d.data().email+" - "+d.data().score+"\n";
});

alert(txt);
}

// TEACHER DASHBOARD
async function showTeacherDashboard(){
if(!isTeacher)return alert("No access");

let snap=await db.collection("scores").get();

let txt="TEACHER DASHBOARD\n";
snap.forEach(d=>{
txt+=d.data().email+" : "+d.data().score+"\n";
});

alert(txt);
}

</script>

</body>
</html>
