<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Quiz System</title>

<style>
body{font-family:Poppins,Arial;margin:0;background:#f1f5f9;text-align:center}
button{padding:12px;margin:6px;border:none;background:#2563eb;color:#fff;border-radius:10px;cursor:pointer}
.card{background:#fff;margin:15px auto;padding:20px;border-radius:12px;max-width:600px;box-shadow:0 10px 20px rgba(0,0,0,.1)}
.hidden{display:none}
input{padding:10px;margin:5px;width:80%;max-width:300px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>ICT Quiz System</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="roleText"></p>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

  <h3>Welcome <span id="user"></span></h3>

  <button onclick="startQuiz()">Start Quiz</button>
  <button onclick="showLeaderboard()">Leaderboard</button>

  <div id="teacherPanel" class="hidden">
    <button onclick="openEditor()">Edit Questions (Teacher)</button>
    <button onclick="registerTeacher()">Become Teacher</button>
  </div>

  <button onclick="logout()">Logout</button>

  <div id="quiz" class="card hidden"></div>
  <div id="leaderboard" class="card hidden"></div>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_CONFIG",
  authDomain: "YOUR_FIREBASE_CONFIG",
  projectId: "YOUR_FIREBASE_CONFIG",
  storageBucket: "YOUR_FIREBASE_CONFIG",
  messagingSenderId: "YOUR_FIREBASE_CONFIG",
  appId: "YOUR_FIREBASE_CONFIG"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= STATE =================
let currentUser=null;
let isTeacher=false;
let questions=[];
let index=0;
let score=0;

// ================= GOOGLE LOGIN =================
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(async res=>{
    currentUser = res.user;

    const ref = db.collection("users").doc(currentUser.email);
    const doc = await ref.get();

    if(!doc.exists){
      await ref.set({
        email: currentUser.email,
        role: "student",
        attempts: 0
      });
    }

    const data = (await ref.get()).data();
    isTeacher = data.role === "teacher";

    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("user").innerText = currentUser.displayName;

    document.getElementById("teacherPanel").classList.toggle("hidden", !isTeacher);

    loadQuestions();
  });
}

// ================= TEACHER REGISTRATION =================
async function registerTeacher(){
  await db.collection("users").doc(currentUser.email).update({
    role: "teacher"
  });

  isTeacher = true;
  document.getElementById("teacherPanel").classList.remove("hidden");
  alert("You are now a teacher");
}

// ================= LOAD QUESTIONS =================
async function loadQuestions(){
  questions = [];
  const snap = await db.collection("questions").get();

  snap.forEach(doc=>{
    questions.push(doc.data());
  });

  if(questions.length===0){
    questions = [
      {q:"ICT stands for?",o:["Info & Com Tech","Internet Tool","Code Tech","None"],a:0}
    ];
  }
}

// ================= QUIZ =================
function startQuiz(){
  index=0;
  score=0;
  document.getElementById("quiz").classList.remove("hidden");
  loadQ();
}

function loadQ(){
  let q = questions[index];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.o.map((o,i)=>`<button onclick="answer(${i})">${o}</button>`).join("")}
  `;
}

async function answer(i){
  if(i===questions[index].a) score++;
  index++;

  index < questions.length ? loadQ() : finish();
}

// ================= FINISH =================
async function finish(){
  document.getElementById("quiz").innerHTML = `
    <h2>Score: ${score}/${questions.length}</h2>
  `;

  await db.collection("scores").add({
    email: currentUser.email,
    score: score,
    total: questions.length
  });

  const ref = db.collection("users").doc(currentUser.email);
  const data = (await ref.get()).data();

  if(data.attempts < 2){
    await ref.update({attempts: data.attempts + 1});
  } else {
    alert("2 attempts reached");
  }
}

// ================= LEADERBOARD =================
async function showLeaderboard(){
  const snap = await db.collection("scores").orderBy("score","desc").limit(10).get();

  let html="<h3>Leaderboard</h3>";

  snap.forEach(d=>{
    html += `<p>${d.data().email} - ${d.data().score}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
  document.getElementById("leaderboard").classList.remove("hidden");
}

// ================= TEACHER QUESTION EDITOR =================
function openEditor(){
  if(!isTeacher){
    alert("Teacher only");
    return;
  }

  let box = document.createElement("div");
  box.className="card";

  box.innerHTML = `
    <h3>Add Question</h3>
    <input id="q" placeholder="Question"><br>
    <input id="o1" placeholder="Option 1"><br>
    <input id="o2" placeholder="Option 2"><br>
    <input id="o3" placeholder="Option 3"><br>
    <input id="o4" placeholder="Option 4"><br>
    <input id="a" placeholder="Correct Index (0-3)"><br>
    <button onclick="saveQ()">Save</button>
  `;

  document.body.appendChild(box);
}

async function saveQ(){
  await db.collection("questions").add({
    q: document.getElementById("q").value,
    o: [
      document.getElementById("o1").value,
      document.getElementById("o2").value,
      document.getElementById("o3").value,
      document.getElementById("o4").value
    ],
    a: parseInt(document.getElementById("a").value)
  });

  alert("Question saved!");
}

// ================= LOGOUT =================
function logout(){
  auth.signOut();
  location.reload();
}

</script>

</body>
</html>
